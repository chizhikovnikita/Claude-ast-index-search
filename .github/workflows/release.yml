name: Release Build

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.10.0)'
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            name: darwin-arm64
            npm_suffix: darwin-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: darwin-x86_64
            npm_suffix: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: linux-x86_64
            npm_suffix: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            name: linux-arm64
            npm_suffix: linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            npm_suffix: win32-x64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.name != 'windows-x86_64'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../ast-index-${{ env.RELEASE_TAG }}-${{ matrix.name }}.tar.gz ast-index

      - name: Package (windows)
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/ast-index.exe" -DestinationPath "ast-index-${{ env.RELEASE_TAG }}-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ast-index-${{ matrix.name }}
          path: ast-index-${{ env.RELEASE_TAG }}-${{ matrix.name }}.*

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Copy binary to npm platform package (unix)
        if: matrix.name != 'windows-x86_64'
        run: cp target/${{ matrix.target }}/release/ast-index npm/platforms/${{ matrix.npm_suffix }}/bin/ast-index

      - name: Copy binary to npm platform package (windows)
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/ast-index.exe" "npm/platforms/${{ matrix.npm_suffix }}/bin/ast-index.exe"

      - name: Publish npm platform package
        run: cd npm/platforms/${{ matrix.npm_suffix }} && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: artifacts/*

  publish-npm:
    name: Publish npm base package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish base package
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download archives and compute sha256
        id: sha
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          for platform in darwin-arm64 darwin-x86_64 linux-x86_64 linux-arm64; do
            curl -L -o "ast-index-${platform}.tar.gz" \
              "https://github.com/${REPO}/releases/download/${TAG}/ast-index-${TAG}-${platform}.tar.gz"
            hash=$(sha256sum "ast-index-${platform}.tar.gz" | cut -d ' ' -f1)
            echo "${platform}=${hash}" >> "$GITHUB_OUTPUT"
          done

      - name: Clone homebrew tap
        run: git clone --depth 1 https://github.com/defendend/homebrew-ast-index.git homebrew-tap

      - name: Update formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ env.RELEASE_TAG }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin-arm64 }}
          SHA_DARWIN_X86_64: ${{ steps.sha.outputs.darwin-x86_64 }}
          SHA_LINUX_X86_64: ${{ steps.sha.outputs.linux-x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux-arm64 }}
        run: |
          cat > Formula/ast-index.rb << FORMULA
          class AstIndex < Formula
            desc "Fast code search CLI for Android, iOS, TypeScript, Rust, Ruby, C#, Python, Go, Perl, C++ projects"
            homepage "https://github.com/defendend/Claude-ast-index-search"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/defendend/Claude-ast-index-search/releases/download/${TAG}/ast-index-${TAG}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/defendend/Claude-ast-index-search/releases/download/${TAG}/ast-index-${TAG}-darwin-x86_64.tar.gz"
                sha256 "${SHA_DARWIN_X86_64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/defendend/Claude-ast-index-search/releases/download/${TAG}/ast-index-${TAG}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/defendend/Claude-ast-index-search/releases/download/${TAG}/ast-index-${TAG}-linux-x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
            end

            def install
              bin.install "ast-index"
            end

            test do
              assert_match "ast-index v${VERSION}", shell_output("#{bin}/ast-index version")
            end
          end
          FORMULA

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ast-index.rb
          git diff --staged --quiet && echo "Formula already up to date" && exit 0
          git commit -m "Update to ${{ env.RELEASE_TAG }}"
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/defendend/homebrew-ast-index.git"
          git push origin HEAD:main

  update-winget:
    name: Update Winget Package
    needs: release
    runs-on: windows-latest
    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update winget manifest
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: defendend.ast-index
          version: ${{ steps.version.outputs.version }}
          installers-regex: 'windows-x86_64\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
